# Supabase project config
# https://supabase.com/docs/reference/cli/config
#
# This file is checked into git so the Supabase CLI knows which project
# `supabase db push` should target. Secrets (PAT + DB password) live in
# GitHub Actions secrets, never in this file.

project_id = "ypeypgwsycxcagncgdur"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://www.surprisegranite.com"
additional_redirect_urls = ["https://surprise-granite-email-api.onrender.com"]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = false

[analytics]
enabled = false
