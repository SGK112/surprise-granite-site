<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Complete Your ASPN Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/aspn/aspn.css?v=20260429a"/>
  <link rel="stylesheet" href="/css/marketplace-mobile-fix.css?v=20260501b"/>
  <script defer src="/js/image-fallback.js?v=20260501a"></script>
</head>
<body>
  <header class="aspn-nav">
    <div class="aspn-nav__inner">
      <a href="/aspn/" class="aspn-nav__brand">
        <span class="aspn-nav__logo">ASPN</span>
        <span class="aspn-nav__brand-text">Arizona Stone Providers Network</span>
      </a>
      <nav class="aspn-nav__links">
        <a href="/aspn/directory/">Directory</a>
        <a href="/aspn/">Home</a>
      </nav>
    </div>
  </header>

  <section class="aspn-hero" style="padding-bottom:60px;">
    <div class="aspn-hero__inner" style="text-align:center;max-width:680px;margin:0 auto;">
      <div class="aspn-hero__badge">Complete your profile</div>
      <h1 class="aspn-hero__h1" style="font-size:clamp(2rem,5vw,3rem);">Add the <span class="aspn-hero__accent">details</span></h1>
      <p class="aspn-hero__sub" style="margin-left:auto;margin-right:auto;">Everything below is optional but boosts your visibility in the directory and search.</p>
    </div>
  </section>

  <section class="aspn-section">
    <div class="aspn-section__inner">
      <div id="msg"></div>
      <form id="completeForm" class="aspn-form" novalidate>
        <div class="aspn-form__row">
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="contact_name">Your Name</label>
            <input type="text" id="contact_name" name="contact_name" class="aspn-form__input"/>
          </div>
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" class="aspn-form__input"/>
          </div>
        </div>
        <div class="aspn-form__row">
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="city">City</label>
            <input type="text" id="city" name="city" class="aspn-form__input"/>
          </div>
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="zip">ZIP</label>
            <input type="text" id="zip" name="zip" class="aspn-form__input"/>
          </div>
        </div>
        <div class="aspn-form__field">
          <label class="aspn-form__label" for="website">Website</label>
          <input type="url" id="website" name="website" class="aspn-form__input" placeholder="https://"/>
        </div>
        <div class="aspn-form__field">
          <label class="aspn-form__label" for="short_description">One-line description <span class="aspn-form__hint">200 chars max — shows on directory card</span></label>
          <textarea id="short_description" name="short_description" class="aspn-form__textarea" maxlength="200"></textarea>
        </div>
        <div class="aspn-form__field">
          <label class="aspn-form__label" for="long_description">About your business <span class="aspn-form__hint">shows on your member page</span></label>
          <textarea id="long_description" name="long_description" class="aspn-form__textarea" rows="5" style="min-height:140px;"></textarea>
        </div>
        <div class="aspn-form__field">
          <label class="aspn-form__label" for="specialties">Specialties <span class="aspn-form__hint">comma-separated · e.g. quartz, quartzite, kitchen islands</span></label>
          <input type="text" id="specialties" name="specialties" class="aspn-form__input"/>
        </div>
        <div class="aspn-form__field">
          <label class="aspn-form__label" for="service_areas">Service Areas <span class="aspn-form__hint">comma-separated cities</span></label>
          <input type="text" id="service_areas" name="service_areas" class="aspn-form__input" placeholder="Surprise, Peoria, Glendale, Phoenix"/>
        </div>
        <div class="aspn-form__row">
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="instagram_url">Instagram URL</label>
            <input type="url" id="instagram_url" name="instagram_url" class="aspn-form__input"/>
          </div>
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="houzz_url">Houzz URL</label>
            <input type="url" id="houzz_url" name="houzz_url" class="aspn-form__input"/>
          </div>
        </div>
        <div class="aspn-form__row">
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="yelp_url">Yelp URL</label>
            <input type="url" id="yelp_url" name="yelp_url" class="aspn-form__input"/>
          </div>
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="google_url">Google Maps URL</label>
            <input type="url" id="google_url" name="google_url" class="aspn-form__input"/>
          </div>
        </div>
        <div class="aspn-form__row">
          <div class="aspn-form__field">
            <label class="aspn-form__label" for="az_roc_license">AZ ROC License #</label>
            <input type="text" id="az_roc_license" name="az_roc_license" class="aspn-form__input"/>
          </div>
          <div class="aspn-form__field">
            <label class="aspn-form__label">
              <input type="checkbox" id="bonded_insured" name="bonded_insured" style="margin-right:8px;"/>
              Bonded &amp; Insured
            </label>
          </div>
        </div>
        <button type="submit" id="submitBtn" class="aspn-btn aspn-btn--primary aspn-btn--block">Save Profile</button>
      </form>
    </div>
  </section>

  <footer class="aspn-footer">
    <div class="aspn-footer__inner">
      <div>© <span id="year"></span> Arizona Stone Providers Network</div>
      <div><a href="/aspn/">Home</a> · <a href="/aspn/directory/">Directory</a></div>
    </div>
  </footer>

  <script>
    const API_BASE = (typeof window !== 'undefined' && window.SG_CONFIG?.API_BASE) || 'https://surprise-granite-email-api.onrender.com';
    document.getElementById('year').textContent = new Date().getFullYear();
    const params = new URLSearchParams(location.search);
    const id = params.get('id'), token = params.get('token');
    const form = document.getElementById('completeForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    if (!id || !token) {
      msg.innerHTML = '<div class="aspn-form__msg aspn-form__msg--err">Missing profile ID or verification token. Please use the link from your welcome email.</div>';
      btn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.innerHTML = '';
      btn.disabled = true; btn.textContent = 'Saving…';
      const fd = new FormData(form);
      const body = { verification_token: token };
      for (const [k, v] of fd.entries()) {
        if (k === 'specialties' || k === 'service_areas') {
          body[k] = (v || '').split(',').map(x => x.trim()).filter(Boolean);
        } else if (k === 'bonded_insured') {
          body[k] = true;
        } else if (v) {
          body[k] = v;
        }
      }
      try {
        const r = await fetch(API_BASE + '/api/aspn/members/' + encodeURIComponent(id), {
          method: 'PATCH',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        const j = await r.json();
        if (!r.ok || !j.success) throw new Error(j.error || 'Save failed');
        msg.innerHTML = '<div class="aspn-form__msg aspn-form__msg--ok"><strong>Profile saved.</strong> ' + (j.member?.approved ? 'Your profile is live in the directory.' : 'It\'ll publish once approved (usually within 24 hours).') + '</div>';
        btn.textContent = 'Save Profile';
        btn.disabled = false;
      } catch (err) {
        msg.innerHTML = '<div class="aspn-form__msg aspn-form__msg--err">Could not save: ' + (err.message || 'Network error') + '</div>';
        btn.disabled = false; btn.textContent = 'Save Profile';
      }
    });
  </script>
</body>
</html>
