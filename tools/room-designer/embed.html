<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design View | Remodely</title>
  <link rel="icon" href="https://cdn.prod.website-files.com/6456ce4476abb25581fbad0c/6456ce4476abb269c6fbb176_Surprise-Granite-favicon-32x32px.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f5f5; }

    .embed-container {
      max-width: 100%;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .embed-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .embed-back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      text-decoration: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .embed-back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .embed-title {
      font-size: 18px;
      font-weight: 600;
    }

    .embed-meta {
      font-size: 13px;
      opacity: 0.8;
    }

    .embed-3d-viewer {
      width: 100%;
      height: 400px;
      position: relative;
      background: #0d0d15;
    }

    .embed-footer {
      padding: 16px 20px;
      background: #f8f9fa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .embed-quote {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .embed-quote-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .embed-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .embed-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive - Mobile First */
    @media (max-width: 768px) {
      .embed-container {
        border-radius: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .embed-header {
        flex-direction: row;
        gap: 10px;
        padding: 12px;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .embed-back-btn {
        width: 36px;
        height: 36px;
      }

      .embed-title {
        font-size: 16px;
      }

      #companyName {
        display: none;
      }

      .embed-3d-viewer {
        flex: 1;
        min-height: 50vh;
        height: auto;
      }

      .embed-footer {
        flex-direction: column;
        text-align: center;
        padding: 20px 16px;
        gap: 16px;
        position: sticky;
        bottom: 0;
        background: linear-gradient(180deg, rgba(248, 249, 250, 0.9) 0%, #f8f9fa 20%);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .embed-quote {
        font-size: 32px;
      }

      .embed-cta {
        width: 100%;
        justify-content: center;
        padding: 16px 24px;
        font-size: 16px;
        border-radius: 12px;
      }
    }

    @media (max-width: 400px) {
      .embed-header { padding: 12px; }
      .embed-title { font-size: 16px; }
      .embed-meta { font-size: 12px; }
      .embed-footer { padding: 16px 12px; }
      .embed-quote { font-size: 28px; }
    }

    /* Touch-friendly controls */
    @media (pointer: coarse) {
      .embed-cta {
        min-height: 52px;
      }
    }

    /* Fullscreen mode for mobile */
    .fullscreen-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      transition: background 0.2s;
    }

    .fullscreen-btn:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    /* Pinch zoom hint for mobile */
    .zoom-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .zoom-hint.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="embed-container">
    <div class="embed-header">
      <a href="/" class="embed-back-btn" title="Back to Home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
      </a>
      <div style="flex: 1; min-width: 0;">
        <div class="embed-title" id="projectName">Kitchen Design</div>
        <div class="embed-meta" id="projectMeta">144" × 120" Kitchen</div>
      </div>
      <div class="embed-meta" id="companyName">Remodely</div>
    </div>

    <div class="embed-3d-viewer" id="viewer3d">
      <div class="loading">
        <div class="loading-spinner"></div>
        Loading 3D view...
      </div>
      <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
      <div class="zoom-hint" id="zoomHint">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Pinch to zoom, drag to rotate
      </div>
    </div>

    <div class="embed-footer">
      <div>
        <div class="embed-quote-label">Estimated Project Total</div>
        <div class="embed-quote" id="quoteTotal">$0.00</div>
      </div>
      <a href="javascript:void(0)" class="embed-cta" id="openDesigner">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Open in Designer
      </a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('viewer3d').innerHTML = '<div class="loading">No design specified</div>';
    } else {
      loadDesign(token);
    }

    async function loadDesign(shareToken) {
      const SUPABASE_URL = 'https://ypeypgwsycxcagncgdur.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZXlwZ3dzeWN4Y2FnbmNnZHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NTQ4MjMsImV4cCI6MjA4MzMzMDgyM30.R13pNv2FDtGhfeu7gUcttYNrQAbNYitqR4FIq3O2-ME';

      try {
        // Try share token first
        let response = await fetch(
          `${SUPABASE_URL}/rest/v1/room_designs?share_token=eq.${shareToken}&select=*`,
          { headers: { 'apikey': SUPABASE_ANON_KEY } }
        );
        let data = await response.json();
        let design = data[0];

        if (!design) {
          document.getElementById('viewer3d').innerHTML = '<div class="loading">Design not found</div>';
          return;
        }

        // Update UI
        document.getElementById('projectName').textContent = design.project_name || design.name || 'Kitchen Design';
        document.getElementById('projectMeta').textContent = `${Math.round((design.room_width || 12) * 12)}" × ${Math.round((design.room_depth || 10) * 12)}" ${design.room_type || 'Kitchen'}`;
        document.getElementById('companyName').textContent = design.settings?.company_name || 'Remodely';
        document.getElementById('quoteTotal').textContent = '$' + (design.quote_total || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('openDesigner').href = `/tools/room-designer/?token=${shareToken}`;

        // Initialize 3D viewer
        init3DViewer(design);

      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('viewer3d').innerHTML = '<div class="loading">Error loading design</div>';
      }
    }

    // Global state for cleanup
    let activeViewer = null;
    const textureLoader = new THREE.TextureLoader();

    function init3DViewer(design) {
      // Dispose previous viewer if exists
      if (activeViewer) {
        cancelAnimationFrame(activeViewer.animationId);
        activeViewer.controls.dispose();
        activeViewer.scene.traverse(obj => {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) {
            if (obj.material.map) obj.material.map.dispose();
            obj.material.dispose();
          }
        });
        activeViewer.renderer.dispose();
        activeViewer = null;
      }

      const container = document.getElementById('viewer3d');
      container.innerHTML = '';

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d0d15);

      const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      renderer.physicallyCorrectLights = true;
      container.appendChild(renderer.domElement);

      // Lighting — multi-light setup for quality
      const ambient = new THREE.AmbientLight(0xffffff, 0.35);
      scene.add(ambient);

      // Hemisphere light for natural sky/ground bounce
      const hemi = new THREE.HemisphereLight(0xddeeff, 0x8B7355, 0.3);
      scene.add(hemi);

      // Key light (sun)
      const sun = new THREE.DirectionalLight(0xFFF8E7, 1.0);
      sun.position.set(10, 18, 8);
      sun.castShadow = true;
      sun.shadow.mapSize.width = 2048;
      sun.shadow.mapSize.height = 2048;
      sun.shadow.camera.near = 0.5;
      sun.shadow.camera.far = 60;
      sun.shadow.camera.left = -20;
      sun.shadow.camera.right = 20;
      sun.shadow.camera.top = 20;
      sun.shadow.camera.bottom = -20;
      sun.shadow.bias = -0.001;
      scene.add(sun);

      // Fill light (softer, from opposite side)
      const fill = new THREE.DirectionalLight(0xE8F0FF, 0.35);
      fill.position.set(-8, 12, -5);
      scene.add(fill);

      // Accent spot for countertops
      const roomWidth = design.room_width || 12;
      const roomDepth = design.room_depth || 10;
      const roomHeight = design.room_height || 8;

      const counterSpot = new THREE.SpotLight(0xFFFFFF, 0.5, 20, Math.PI / 4, 0.5);
      counterSpot.position.set(roomWidth / 2, roomHeight, roomDepth / 3);
      counterSpot.target.position.set(roomWidth / 2, 3, roomDepth / 3);
      scene.add(counterSpot);
      scene.add(counterSpot.target);

      // Floor
      const floorMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C, roughness: 0.8, metalness: 0 });
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth + 4, roomDepth + 4), floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(roomWidth / 2, 0, roomDepth / 2);
      floor.receiveShadow = true;
      scene.add(floor);

      // Walls — slight thickness for realism
      const wallMat = new THREE.MeshStandardMaterial({ color: 0xFFFAF0, roughness: 0.9, side: THREE.DoubleSide });
      const wallThick = 0.15;

      // Back wall
      const backWall = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, roomHeight, wallThick), wallMat);
      backWall.position.set(roomWidth / 2, roomHeight / 2, -wallThick / 2);
      backWall.receiveShadow = true;
      scene.add(backWall);

      // Left wall
      const leftWall = new THREE.Mesh(new THREE.BoxGeometry(wallThick, roomHeight, roomDepth), wallMat);
      leftWall.position.set(-wallThick / 2, roomHeight / 2, roomDepth / 2);
      leftWall.receiveShadow = true;
      scene.add(leftWall);

      // Right wall (transparent for viewing)
      const rightWallMat = new THREE.MeshStandardMaterial({ color: 0xFFFAF0, roughness: 0.9, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
      const rightWall = new THREE.Mesh(new THREE.BoxGeometry(wallThick, roomHeight, roomDepth), rightWallMat);
      rightWall.position.set(roomWidth + wallThick / 2, roomHeight / 2, roomDepth / 2);
      scene.add(rightWall);

      // Ceiling (subtle, semi-transparent)
      const ceilMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 1, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
      const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomDepth), ceilMat);
      ceiling.rotation.x = Math.PI / 2;
      ceiling.position.set(roomWidth / 2, roomHeight, roomDepth / 2);
      scene.add(ceiling);

      // Elements rendering
      const elements = design.elements || [];
      const savedScale = design.settings?.pixelsPerFoot || 40;

      elements.forEach(el => {
        if (!el.width || !el.height) return;

        const w = el.width;
        const d = el.height;
        const elHeight = el.actualHeight || getElementHeight(el.type);

        // Convert position from pixels to feet
        const xPos = (el.x / savedScale) + w / 2;
        const zPos = (el.y / savedScale) + d / 2;
        const yPos = getYPosition(el.type, elHeight);

        // Parse element color
        let color = el.color || '#808080';
        if (typeof color === 'string' && color.startsWith('#')) {
          color = parseInt(color.replace('#', ''), 16);
        }

        // Material properties vary by type
        let roughness = 0.5;
        let metalness = 0;
        if (['countertop', 'countertop-l', 'countertop-u', 'countertop-corner', 'island-countertop'].includes(el.type)) {
          roughness = 0.15; metalness = 0.05; // Polished stone
        } else if (['refrigerator', 'range', 'slide-in-range', 'oven', 'dishwasher', 'microwave', 'range-hood'].includes(el.type)) {
          roughness = 0.2; metalness = 0.6; // Stainless steel
        } else if (['sink'].includes(el.type)) {
          roughness = 0.1; metalness = 0.8;
        } else if (['flooring', 'tile', 'hardwood'].includes(el.type)) {
          roughness = 0.7; metalness = 0;
        }

        const mat = new THREE.MeshStandardMaterial({ color, roughness, metalness });

        // Load texture if available
        const textureUrl = el.textureUrl || el.materialUrl;
        if (textureUrl) {
          try {
            let fullUrl = textureUrl;
            if (textureUrl.startsWith('/') && !textureUrl.startsWith('//')) {
              fullUrl = window.location.origin + textureUrl;
            }
            textureLoader.load(fullUrl, tex => {
              tex.wrapS = THREE.RepeatWrapping;
              tex.wrapT = THREE.RepeatWrapping;
              const repeatX = Math.max(1, w / 5);
              const repeatY = Math.max(1, d / 5);
              tex.repeat.set(repeatX, repeatY);
              mat.map = tex;
              mat.needsUpdate = true;
            });
          } catch (e) { /* texture load failed, use solid color */ }
        }

        // Skip rendering flooring as a box — it's just a thin plane
        let geom;
        if (['flooring', 'tile', 'hardwood', 'laminate', 'vinyl', 'carpet'].includes(el.type)) {
          geom = new THREE.PlaneGeometry(w, d);
          const mesh = new THREE.Mesh(geom, mat);
          mesh.rotation.x = -Math.PI / 2;
          mesh.position.set(xPos, 0.01, zPos);
          mesh.receiveShadow = true;
          scene.add(mesh);
          return;
        }

        geom = new THREE.BoxGeometry(w, elHeight, d);
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(xPos, yPos, zPos);
        mesh.rotation.y = -(el.rotation || 0) * Math.PI / 180;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
      });

      // Camera & controls
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.target.set(roomWidth / 2, 1.5, roomDepth / 2);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minDistance = 2;
      controls.maxDistance = Math.max(roomWidth, roomDepth) * 3;
      controls.maxPolarAngle = Math.PI * 0.48; // Prevent going under floor

      // Position camera at a nice angle
      const camDist = Math.max(roomWidth, roomDepth) * 1.1;
      camera.position.set(roomWidth / 2 + camDist * 0.7, camDist * 0.45, roomDepth / 2 + camDist * 0.7);
      controls.update();

      // Animation loop
      let animationId;
      function animate() {
        animationId = requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // Store for cleanup
      activeViewer = { scene, camera, renderer, controls, animationId };

      // Handle resize
      const onResize = () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      };
      window.addEventListener('resize', onResize);
    }

    function getElementHeight(type) {
      const heights = {
        // Base cabinets (34.5" = 2.875')
        'base-cabinet': 2.875, 'sink-base': 2.875, 'drawer-base': 2.875,
        'corner-cabinet': 2.875, 'lazy-susan': 2.875, 'blind-corner': 2.875,
        'filler': 2.875, 'scribe': 2.875,
        // Wall cabinets (30" = 2.5')
        'wall-cabinet': 2.5, 'glass-cabinet': 2.5, 'microwave-cabinet': 2.5,
        'above-microwave-cabinet': 1.25,
        // Tall cabinets (84" = 7')
        'tall-cabinet': 7, 'pantry': 7, 'fridge-cabinet': 7,
        'single-oven-cabinet': 7, 'tall-oven': 7, 'double-oven-cabinet': 7,
        'linen-closet': 7,
        // Countertops (1.5" = 0.125')
        'countertop': 0.125, 'countertop-l': 0.125, 'countertop-u': 0.125,
        'countertop-corner': 0.125, 'island-countertop': 0.125,
        // Islands (36" = 3')
        'island': 3,
        // Appliances
        'refrigerator': 5.833, 'range': 3, 'slide-in-range': 3,
        'oven': 2.5, 'wall-oven-double': 4.5, 'cooktop': 0.25,
        'microwave': 1.25, 'range-hood': 1.5, 'dishwasher': 2.875,
        'washer': 3.25, 'dryer': 3.25,
        'wine-cooler': 2.875, 'beverage-center': 2.875, 'ice-maker': 2.875,
        'trash-compactor': 2.875, 'warming-drawer': 0.833,
        // Plumbing
        'sink': 0.5, 'toilet': 2.5, 'bathtub': 1.75,
        'bathtub-freestanding': 2.083, 'shower-pan': 0.25,
        'pedestal-sink': 2.833,
        // Fixtures
        'faucet': 1.167, 'mirror': 2.5, 'towel-bar': 0.25,
        'shower-niche': 1,
        // Walls
        'wall': 8, 'wall-block': 8, 'wall-concrete': 8, 'wall-framed': 8,
        'pony-wall': 3.5, 'knee-wall': 3, 'shower-wall': 6,
        // Doors & windows
        'door': 6.67, 'door-entry': 6.67, 'door-sliding': 6.67,
        'door-french': 6.67, 'door-pocket': 6.67,
        'window': 3, 'window-large': 4, 'window-small': 2, 'skylight': 0.25,
        // Flooring
        'flooring': 0.04, 'tile': 0.04, 'hardwood': 0.04,
        'laminate': 0.04, 'vinyl': 0.04, 'carpet': 0.04,
        // Backsplash
        'backsplash': 1.5,
        // Structural
        'beam': 0.667, 'column': 8, 'soffit': 1
      };
      return heights[type] || 2;
    }

    function getYPosition(type, h) {
      // Wall-mounted elements
      if (['wall-cabinet', 'glass-cabinet', 'microwave-cabinet'].includes(type)) return 4.5 + h/2;
      if (type === 'above-microwave-cabinet') return 5.75 + h/2;
      if (type === 'countertop' || type === 'countertop-l' || type === 'countertop-u' ||
          type === 'countertop-corner' || type === 'island-countertop') return 3 + h/2;
      if (type === 'cooktop') return 3 + h/2;
      if (type === 'sink') return 2.75 + h/2;
      if (type === 'range-hood') return 5 + h/2;
      if (['window', 'window-large', 'window-small'].includes(type)) return 3 + h/2;
      if (type === 'skylight') return 8;
      if (type === 'mirror') return 4 + h/2;
      if (type === 'shower-niche') return 4 + h/2;
      if (type === 'backsplash') return 3.125 + h/2;
      if (type === 'beam' || type === 'soffit') return 8 - h/2;
      if (['flooring', 'tile', 'hardwood', 'laminate', 'vinyl', 'carpet'].includes(type)) return 0.02;
      if (['door', 'door-entry', 'door-sliding', 'door-french', 'door-pocket'].includes(type)) return h/2;
      // Floor-standing elements
      return h/2;
    }

    // Fullscreen toggle
    function toggleFullscreen() {
      const container = document.getElementById('viewer3d');
      if (!document.fullscreenElement) {
        if (container.requestFullscreen) {
          container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    }

    // Show zoom hint on mobile after load
    function showZoomHint() {
      if ('ontouchstart' in window) {
        const hint = document.getElementById('zoomHint');
        if (hint) {
          setTimeout(() => {
            hint.classList.add('show');
            setTimeout(() => hint.classList.remove('show'), 3000);
          }, 1500);
        }
      }
    }

    // Call after design loads
    const origLoadDesign = loadDesign;
    loadDesign = async function(token) {
      await origLoadDesign(token);
      showZoomHint();
    };
  </script>
