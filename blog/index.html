<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Kitchen & Bathroom Remodeling Blog | Surprise Granite</title>
  <meta name="description" content="Expert tips, cost guides, and inspiration for kitchen and bathroom remodeling in Phoenix, AZ. Granite, quartz, marble countertops, tile, and more."/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="canonical" href="https://www.surprisegranite.com/blog/"/>
  <meta property="og:title" content="Remodeling Blog | Surprise Granite"/>
  <meta property="og:description" content="Expert tips and cost guides for kitchen and bathroom remodeling in Arizona."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://www.surprisegranite.com/blog/"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link href="https://cdn.prod.website-files.com/6456ce4476abb25581fbad0c/6456ce4476abb269c6fbb176_Surprise-Granite-favicon-32x32px.png" rel="shortcut icon" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/unified-nav.css?v=20260130"/>
  <script defer src="/js/unified-nav.js?v=20260426b"></script>
  <style>
    :root { --gold: #f9cb00; --navy: #1a1a2e; --navy-light: #2d2d44; --bg: #fff; --bg-alt: #f8fafc; --border: #e2e8f0; --text: #1a1a2e; --text-sec: #64748b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    .blog-hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      padding: 56px 24px; text-align: center; color: #fff;
    }
    .blog-hero h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 800; margin-bottom: 8px; }
    .blog-hero p { color: rgba(255,255,255,0.75); font-size: 16px; max-width: 600px; margin: 0 auto; }

    .blog-container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    .blog-filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; justify-content: center;
    }
    .blog-filter {
      padding: 8px 18px; border-radius: 24px; border: 2px solid var(--border); background: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text);
    }
    .blog-filter:hover, .blog-filter.active { border-color: var(--gold); background: rgba(249,203,0,0.08); color: var(--navy); }

    .blog-count { text-align: center; color: var(--text-sec); font-size: 14px; margin-bottom: 24px; }

    .blog-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px;
    }
    @media (max-width: 480px) { .blog-grid { grid-template-columns: 1fr; } }

    .blog-card {
      background: #fff; border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; transition: all 0.25s; text-decoration: none; color: inherit; display: block;
    }
    .blog-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

    .blog-card-img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--bg-alt);
    }

    .blog-card-body { padding: 20px; }
    .blog-card-cat {
      display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      background: rgba(249,203,0,0.12); color: #b8860b; margin-bottom: 10px;
    }
    .blog-card-title { font-size: 18px; font-weight: 700; line-height: 1.35; margin-bottom: 8px; color: var(--navy); }
    .blog-card-desc { font-size: 14px; color: var(--text-sec); line-height: 1.5; margin-bottom: 12px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .blog-card-meta { font-size: 12px; color: #94a3b8; display: flex; gap: 12px; align-items: center; }

    .blog-cta {
      text-align: center; padding: 48px 24px; margin-top: 32px; background: var(--bg-alt); border-radius: 16px;
    }
    .blog-cta h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .blog-cta p { color: var(--text-sec); margin-bottom: 20px; }
    .blog-cta-btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px;
      background: var(--gold); color: var(--navy); border-radius: 10px; font-weight: 700;
      text-decoration: none; font-size: 16px; transition: all 0.2s;
    }
    .blog-cta-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .footer-spacer { height: 80px; }
    .blog-loading { text-align: center; padding: 60px; color: var(--text-sec); }
  </style>
</head>
<body>
  <section class="blog-hero">
    <h1>Remodeling Blog</h1>
    <p>Expert tips, cost guides, and design inspiration for your kitchen and bathroom projects in Arizona.</p>
  </section>

  <div class="blog-container">
    <div class="blog-filters" id="filters"></div>
    <div class="blog-count" id="count"></div>
    <div class="blog-grid" id="grid">
      <div class="blog-loading">Loading articles...</div>
    </div>

    <div class="blog-cta">
      <h2>Ready to Start Your Project?</h2>
      <p>Get a free in-home estimate from our expert team.</p>
      <a href="/get-a-free-estimate/?source=blog" class="blog-cta-btn">Get Free Estimate</a>
    </div>
  </div>

  <div class="footer-spacer"></div>
  <script src="/js/remodely-hub.js"></script>
  <script src="/js/instant-quote.js"></script>
  <script>
    const PLACEHOLDER = '/images/6243807090316203124aee66_placeholder-image.svg';
    let allPosts = [];
    let activeFilter = 'all';

    async function loadBlog() {
      try {
        // Load from JSON data file
        const resp = await fetch('/data/blog-posts.json?v=' + Date.now());
        const data = await resp.json();
        allPosts = (data.posts || []).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        // Also scan for blog directories not in the JSON (new posts)
        // The JSON might be out of date — blog posts exist as /blog/{slug}/index.html
        // We'll use what we have and supplement

        // Build filters
        const categories = [...new Set(allPosts.map(p => p.category).filter(Boolean))];
        const filtersEl = document.getElementById('filters');
        filtersEl.innerHTML = '<button class="blog-filter active" data-cat="all" onclick="filterPosts(\'all\', this)">All</button>' +
          categories.map(c => `<button class="blog-filter" data-cat="${c}" onclick="filterPosts('${c}', this)">${c}</button>`).join('');

        renderPosts(allPosts);
      } catch (err) {
        document.getElementById('grid').innerHTML = '<p style="text-align:center;padding:40px;color:#c00;">Error loading blog posts.</p>';
        console.error('Blog load error:', err);
      }
    }

    function filterPosts(cat, btn) {
      activeFilter = cat;
      document.querySelectorAll('.blog-filter').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const filtered = cat === 'all' ? allPosts : allPosts.filter(p => p.category === cat);
      renderPosts(filtered);
    }

    function renderPosts(posts) {
      document.getElementById('count').textContent = `Showing ${posts.length} article${posts.length !== 1 ? 's' : ''}`;
      const grid = document.getElementById('grid');

      if (posts.length === 0) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;color:#888;grid-column:1/-1;">No articles found.</p>';
        return;
      }

      grid.innerHTML = posts.map(post => {
        const img = (post.image && !post.image.includes('cdn.prod.website-files.com')) ? post.image : PLACEHOLDER;
        const date = post.dateFormatted || (post.date ? new Date(post.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '');
        const desc = (post.description || '').substring(0, 160);
        const url = post.url || `/blog/${post.slug}/`;

        return `
          <a href="${url}" class="blog-card">
            <img class="blog-card-img" src="${img}" alt="${(post.title || '').replace(/"/g, '&quot;')}" loading="lazy" onerror="this.onerror=null;this.src='${PLACEHOLDER}'"/>
            <div class="blog-card-body">
              ${post.category ? `<span class="blog-card-cat">${post.category}</span>` : ''}
              <h2 class="blog-card-title">${post.title || 'Untitled'}</h2>
              <p class="blog-card-desc">${desc}</p>
              <div class="blog-card-meta">
                <span>${date}</span>
                <span>${post.author || 'Surprise Granite'}</span>
              </div>
            </div>
          </a>`;
      }).join('');
    }

    loadBlog();
  </script>
</body>
</html>
