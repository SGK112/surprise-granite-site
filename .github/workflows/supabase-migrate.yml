name: supabase-migrate

# Auto-applies any new file in supabase/migrations/ to the Supabase project
# on push to main. The Supabase CLI tracks applied migrations in the
# `_supabase_migrations` table, so this is idempotent — re-runs and
# previously-applied migrations are no-ops.
#
# Required GitHub repo secrets:
#   SUPABASE_ACCESS_TOKEN — Personal Access Token from
#     https://supabase.com/dashboard/account/tokens (project-scoped)
#   SUPABASE_DB_PASSWORD — DB password from
#     https://supabase.com/dashboard/project/ypeypgwsycxcagncgdur/settings/database

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-migrate.yml'
  workflow_dispatch:  # allows manual run from Actions tab

concurrency:
  group: supabase-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_PROJECT_ID: ypeypgwsycxcagncgdur
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets are set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is missing. Generate a PAT at https://supabase.com/dashboard/account/tokens and add it as a repo secret."
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD is missing. Find it at https://supabase.com/dashboard/project/$SUPABASE_PROJECT_ID/settings/database and add it as a repo secret."
            exit 1
          fi
          # Diagnostics: print length + first/last char (NEVER the value).
          # If length=0, the secret didn't reach the runner.
          # If length is suspiciously low (<10) or has whitespace ends, the paste was probably wrong.
          echo "PAT length: ${#SUPABASE_ACCESS_TOKEN}"
          echo "DB pwd length: ${#SUPABASE_DB_PASSWORD}"
          # Detect leading/trailing whitespace or newlines that GitHub usually strips but worth checking
          if [[ "$SUPABASE_DB_PASSWORD" =~ ^[[:space:]] ]] || [[ "$SUPABASE_DB_PASSWORD" =~ [[:space:]]$ ]]; then
            echo "::warning::DB password has leading or trailing whitespace — this will cause auth failures"
          fi
          if [[ "$SUPABASE_DB_PASSWORD" == *$'\n'* ]] || [[ "$SUPABASE_DB_PASSWORD" == *$'\r'* ]]; then
            echo "::warning::DB password contains newline characters — this will cause auth failures"
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: List pending migrations (preview)
        run: |
          echo "::group::Migration files in supabase/migrations/"
          ls -la supabase/migrations/ || true
          echo "::endgroup::"

      - name: Apply migrations
        run: |
          echo "::group::supabase db push"
          # Prefer SUPABASE_DB_URL (full connection string from Supabase dashboard
          # under Settings → Database → Connection string → URI). Eliminates the
          # "I copied the wrong password field" failure mode. Falls back to
          # SUPABASE_DB_PASSWORD if SUPABASE_DB_URL isn't set.
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            echo "Using SUPABASE_DB_URL (full connection string)"
            supabase db push --include-all --db-url "$SUPABASE_DB_URL" --debug
          else
            echo "Using SUPABASE_DB_PASSWORD (env var)"
            supabase db push --include-all --debug
          fi
          echo "::endgroup::"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Confirm
        run: |
          echo "✅ Migrations applied (or no-op if already current)."
          echo "Verify with: SELECT name, applied_at FROM supabase_migrations.schema_migrations ORDER BY applied_at DESC LIMIT 5;"
