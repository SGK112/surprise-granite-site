name: supabase-migrate

# Auto-applies any new file in supabase/migrations/ to the Supabase project
# on push to main. The Supabase CLI tracks applied migrations in the
# `_supabase_migrations` table, so this is idempotent — re-runs and
# previously-applied migrations are no-ops.
#
# Required GitHub repo secrets:
#   SUPABASE_ACCESS_TOKEN — Personal Access Token from
#     https://supabase.com/dashboard/account/tokens (project-scoped)
#   SUPABASE_DB_PASSWORD — DB password from
#     https://supabase.com/dashboard/project/ypeypgwsycxcagncgdur/settings/database

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-migrate.yml'
  workflow_dispatch:  # allows manual run from Actions tab

concurrency:
  group: supabase-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_PROJECT_ID: ypeypgwsycxcagncgdur
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets are set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is missing. Generate a PAT at https://supabase.com/dashboard/account/tokens and add it as a repo secret."
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD is missing. Find it at https://supabase.com/dashboard/project/$SUPABASE_PROJECT_ID/settings/database and add it as a repo secret."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: List pending migrations (preview)
        run: |
          echo "::group::Migration files in supabase/migrations/"
          ls -la supabase/migrations/ || true
          echo "::endgroup::"

      - name: Apply migrations
        run: |
          echo "::group::supabase db push"
          supabase db push --include-all --debug
          echo "::endgroup::"

      - name: Confirm
        run: |
          echo "✅ Migrations applied (or no-op if already current)."
          echo "Verify with: SELECT name, applied_at FROM supabase_migrations.schema_migrations ORDER BY applied_at DESC LIMIT 5;"
