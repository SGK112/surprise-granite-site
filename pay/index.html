<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make a Payment - Surprise Granite</title>
  <link rel="icon" href="https://cdn.prod.website-files.com/6456ce4476abb25581fbad0c/6456ce4476abb269c6fbb176_Surprise-Granite-favicon-32x32px.png" type="image/x-icon">
  <link rel="apple-touch-icon" href="https://cdn.prod.website-files.com/6456ce4476abb25581fbad0c/6456ce4476abb23120fbb175_Surprise-Granite-webclip-icon-256x256px.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold-primary: #f9cb00;
      --gold-dark: #cca600;
      --dark-deep: #0a0a12;
      --dark-surface: #12121a;
      --dark-elevated: #1e1e2d;
      --dark-input: #16162266;
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.75);
      --text-muted: rgba(255,255,255,0.45);
      --border-subtle: rgba(255,255,255,0.1);
      --border-input: rgba(255,255,255,0.15);
      --success: #22c55e;
      --error: #ef4444;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--dark-deep);
      min-height: 100vh;
      color: var(--text-primary);
      padding: 20px;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 24px 0; }

    /* Header */
    .header { text-align: center; margin-bottom: 32px; }
    .header img { height: 40px; margin-bottom: 12px; filter: brightness(0) invert(1); }
    .header p { color: var(--text-muted); font-size: 14px; letter-spacing: 0.5px; }

    /* Invoice summary banner */
    .invoice-banner {
      display: none;
      background: var(--dark-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: center;
    }
    .invoice-banner.visible { display: block; }
    .invoice-banner .invoice-ref {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .invoice-banner .invoice-amount {
      font-size: 36px;
      font-weight: 800;
      color: var(--gold-primary);
      line-height: 1.1;
    }

    /* Card */
    .card {
      background: var(--dark-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      overflow: hidden;
    }
    .card-body { padding: 28px; }

    /* Form elements */
    .form-group { margin-bottom: 20px; }
    .form-group:last-of-type { margin-bottom: 24px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    label .optional { color: var(--text-muted); font-weight: 400; }
    .input-wrap { position: relative; }
    .input-wrap .prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      font-weight: 600;
      pointer-events: none;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      background: var(--dark-input);
      border: 1px solid var(--border-input);
      border-radius: 12px;
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      border-color: var(--gold-primary);
      box-shadow: 0 0 0 3px rgba(249, 203, 0, 0.15);
    }
    input.has-prefix { padding-left: 36px; }
    .input-error { color: var(--error); font-size: 13px; margin-top: 6px; display: none; }
    .input-error.visible { display: block; }

    /* Error banner */
    .form-error {
      display: none;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 14px;
    }
    .form-error.visible { display: block; }

    /* Pay button */
    .pay-btn {
      width: 100%;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      color: #1a1a2e;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(249, 203, 0, 0.3); }
    .pay-btn:active { transform: translateY(0); }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid rgba(26,26,46,0.3); border-top-color: #1a1a2e; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .security-info {
      padding: 16px 28px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border-subtle);
    }
    .security-info svg { width: 16px; height: 16px; flex-shrink: 0; }
    .security-info .sep { color: rgba(255,255,255,0.15); }

    .contact {
      margin-top: 28px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    .contact a { color: var(--gold-primary); text-decoration: none; font-weight: 500; }
    .contact a:hover { text-decoration: underline; }
    .contact .sep { margin: 0 6px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <img src="https://cdn.prod.website-files.com/6456ce4476abb25581fbad0c/6456ce4476abb27beffbb16a_Surprise%20Granite%20Transparent%20Dark%20Wide.svg" alt="Surprise Granite">
      <p>Secure Payment</p>
    </div>

    <!-- Invoice summary (shown when pre-filled from invoice) -->
    <div class="invoice-banner" id="invoice-banner">
      <div class="invoice-ref" id="banner-ref"></div>
      <div class="invoice-amount" id="banner-amount"></div>
    </div>

    <!-- Payment Card -->
    <div class="card">
      <form id="payment-form" class="card-body">
        <!-- Amount -->
        <div class="form-group">
          <label for="amount">Payment Amount</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="amount" name="amount" step="0.01" min="1" required class="has-prefix" placeholder="0.00">
          </div>
          <p class="input-error" id="amount-error">Minimum payment is $1.00</p>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email for Receipt</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <!-- Invoice -->
        <div class="form-group">
          <label for="invoice">Invoice / Reference Number <span class="optional">(optional)</span></label>
          <input type="text" id="invoice" name="invoice" placeholder="e.g. INV-001">
        </div>

        <!-- Memo -->
        <div class="form-group">
          <label for="memo">Description <span class="optional">(optional)</span></label>
          <input type="text" id="memo" name="memo" placeholder="e.g. Kitchen countertops deposit">
        </div>

        <!-- Error message -->
        <div class="form-error" id="form-error"></div>

        <!-- Pay Button -->
        <button type="submit" id="pay-btn" class="pay-btn">
          <span id="btn-text">Pay Now</span>
          <div class="spinner" id="btn-spinner"></div>
        </button>
      </form>

      <!-- Security footer -->
      <div class="security-info">
        <div style="display:flex;align-items:center;gap:6px;">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          Secured by Stripe
        </div>
        <span class="sep">|</span>
        <div>Card &middot; Bank Transfer</div>
      </div>
    </div>

    <!-- Contact -->
    <div class="contact">
      <p>Questions? Contact us at</p>
      <a href="tel:+16028333189">(602) 833-3189</a>
      <span class="sep">&middot;</span>
      <a href="mailto:info@surprisegranite.com">info@surprisegranite.com</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const amountInput = document.getElementById('amount');
    const emailInput = document.getElementById('email');
    const invoiceInput = document.getElementById('invoice');
    const memoInput = document.getElementById('memo');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    const payBtn = document.getElementById('pay-btn');
    const formError = document.getElementById('form-error');
    const amountError = document.getElementById('amount-error');

    // Pre-fill from URL params
    if (params.get('amount')) {
      const cents = parseInt(params.get('amount'), 10);
      if (cents > 0) {
        amountInput.value = (cents / 100).toFixed(2);
      }
    }
    if (params.get('email')) emailInput.value = params.get('email');
    if (params.get('invoice')) invoiceInput.value = params.get('invoice');
    if (params.get('memo')) memoInput.value = params.get('memo');

    // Show invoice banner if pre-filled from invoice
    if (params.get('amount') && params.get('invoice')) {
      const banner = document.getElementById('invoice-banner');
      const cents = parseInt(params.get('amount'), 10);
      document.getElementById('banner-ref').textContent = params.get('invoice');
      document.getElementById('banner-amount').textContent = '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      banner.classList.add('visible');
    }

    // Update button text when amount changes
    function updateButtonText() {
      const val = parseFloat(amountInput.value);
      if (val && val >= 1) {
        btnText.textContent = 'Pay $' + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        amountError.classList.remove('visible');
      } else {
        btnText.textContent = 'Pay Now';
      }
    }
    amountInput.addEventListener('input', updateButtonText);
    updateButtonText();

    // Form submission
    document.getElementById('payment-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.classList.remove('visible');

      const amount = parseFloat(amountInput.value);
      if (!amount || amount < 1) {
        amountError.classList.add('visible');
        amountInput.focus();
        return;
      }

      const email = emailInput.value.trim();
      if (!email) {
        emailInput.focus();
        return;
      }

      payBtn.disabled = true;
      btnText.textContent = 'Processing...';
      btnSpinner.style.display = 'block';

      try {
        const response = await fetch('https://surprise-granite-email-api.onrender.com/api/stripe/quick-pay', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: Math.round(amount * 100),
            email,
            invoice_ref: invoiceInput.value.trim() || undefined,
            memo: memoInput.value.trim() || undefined
          })
        });

        const data = await response.json();

        if (data.success && data.url) {
          window.location.href = data.url;
        } else {
          throw new Error(data.error || 'Failed to create payment session');
        }
      } catch (err) {
        formError.textContent = err.message || 'Something went wrong. Please try again.';
        formError.classList.add('visible');
        payBtn.disabled = false;
        btnSpinner.style.display = 'none';
        updateButtonText();
      }
    });
  </script>
</body>
</html>
